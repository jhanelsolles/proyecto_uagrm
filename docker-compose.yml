services:
  db:
    image: postgres:15-alpine
    container_name: inscripcion_db
    environment:
      POSTGRES_DB: inscripcion_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inscripcion_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d inscripcion_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: inscripcion_backend
    command: >
      sh -c "cd inscripcion_backend &&
             python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py loaddata initial_data.json &&
             python create_superuser.py &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://admin:admin123@db:5432/inscripcion_db
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=*
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - inscripcion_network

  redis:
    image: redis:7-alpine
    container_name: inscripcion_redis
    ports:
      - "6379:6379"
    networks:
      - inscripcion_network

  celery_worker:
    build: .
    container_name: inscripcion_celery
    command: >
      sh -c "cd inscripcion_backend && celery -A config worker -l info"
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://admin:admin123@db:5432/inscripcion_db
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      web:
        condition: service_started
    networks:
      - inscripcion_network

volumes:
  postgres_data:


networks:
  inscripcion_network:
    driver: bridge
